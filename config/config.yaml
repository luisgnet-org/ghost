# ghost configuration
# Changes are hot-reloaded by the daemon.

jobs:
  # Heartbeat - simple liveness ping (disabled by default)
  - name: heartbeat
    schedule: "every 60s"
    workflow: heartbeat
    message: "ghost is alive"
    enabled: false

  # Toggl sync - polls Toggl API for time tracking data
  - name: toggl_sync
    schedule: "every 5m"
    workflow: toggl_sync
    run_while_sleeping: true
    register_command: false
    enabled: false

  # Activity tracker - auto-log building time from HID + tmux signals
  - name: activity_sync
    schedule: "every 1m"
    workflow: activity_sync
    run_while_sleeping: false
    register_command: false
    enabled: false

  # Activity report - build time summary
  - name: activity_report
    schedule:
      - "on_wake"
      - "every 2h"
    workflow: activity_report
    enabled: false

  # Screen time sync - daily report of app usage
  - name: screentime_sync
    schedule: "on_wake"
    workflow: screentime_sync
    enabled: false

  # Morning brief - sends briefing on wake event
  - name: morning_brief
    schedule: "on_wake"
    workflow: morning_brief
    enabled: false

  # Habit nudge - check habits and nudge if behind schedule
  - name: habit_nudge
    schedule: "every 30m"
    workflow: habit_nudge
    run_while_sleeping: false
    enabled: false

  # Break reminder - nudge to take breaks during long work sessions
  - name: break_reminder
    schedule: "every 30m"
    workflow: break_reminder
    run_while_sleeping: false
    threshold_minutes: 90
    enabled: false

  # Chat responder - respond to messages in a topic
  - name: chat_responder
    schedule: "every 1s"
    workflow: chat_responder
    register_command: false
    enabled: false

  # Daemon status - hourly operational status ping
  - name: daemon_status
    schedule: "every 1h"
    workflow: daemon_status
    run_while_sleeping: false
    enabled: false

