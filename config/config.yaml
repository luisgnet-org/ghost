# ghost configuration
# Changes are hot-reloaded by the daemon.

jobs:
  # Daemon status - periodic health heartbeat
  - name: daemon_status
    schedule: "every 1h"
    workflow: daemon_status
    enabled: true

  # Worker pool - dispatch agents from task board
  - name: worker_pool
    schedule: "every 5s"
    workflow: worker_pool
    enabled: true

  # Example: per-project research agent
  # Uncomment and configure for each project you want to track.
